<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trends — Wypasiony Draminek</title>
  <link rel="stylesheet" href="style.css">
  
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>

</head>
<body>
<header>
  <h1>🍹 Draminek Tracker</h1>
  <nav>
    <a href="index.html" >Overview</a>
    <a href="seo.html" >SEO</a>
    <a href="geo.html" >GEO</a>
    <a href="trends.html" class="active">Trends</a>
  </nav>
  <span style="margin-left:auto;color:#94a3b8;font-size:0.8rem;">2026-05-05 22:08</span>
</header>

<div class="container">
  
<div class="section">
  <h2>Trendy SEO — frazy w Top 10 Google PL</h2>
  <div class="chart-container" id="chartSeo"></div>
</div>

<div class="section">
  <h2>Trendy GEO — wzmianki w AI per silnik</h2>
  <div class="chart-container" id="chartGeo"></div>
</div>

</div>

<footer>
  Wypasiony Draminek Tracker &mdash; ostatni run: 2026-05-05
</footer>


<script>
(function() {
  var seoData = {&#34;x&#34;: [&#34;2026-05-05&#34;], &#34;y&#34;: [27], &#34;name&#34;: &#34;Top 10 SEO&#34;};
  var geoSeries = [{&#34;x&#34;: [&#34;2026-05-05&#34;], &#34;y&#34;: [68], &#34;name&#34;: &#34;anthropic&#34;}, {&#34;x&#34;: [&#34;2026-05-05&#34;], &#34;y&#34;: [37], &#34;name&#34;: &#34;openai&#34;}];

  Plotly.newPlot('chartSeo', [{
    x: seoData.x,
    y: seoData.y,
    type: 'scatter',
    mode: 'lines+markers',
    name: seoData.name,
    line: { color: '#22c55e', width: 2 },
    marker: { size: 8 }
  }], {
    margin: { t: 20, r: 20, b: 40, l: 40 },
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    yaxis: { title: 'Liczba fraz w top 10', rangemode: 'tozero' },
    xaxis: { title: 'Data runu' }
  }, { responsive: true });

  var geoTraces = geoSeries.map(function(s) {
    return { x: s.x, y: s.y, type: 'scatter', mode: 'lines+markers', name: s.name };
  });
  if (geoTraces.length === 0) {
    geoTraces = [{ x: [], y: [], type: 'scatter', name: 'brak danych' }];
  }
  Plotly.newPlot('chartGeo', geoTraces, {
    margin: { t: 20, r: 20, b: 40, l: 40 },
    paper_bgcolor: 'transparent',
    plot_bgcolor: 'transparent',
    yaxis: { title: 'Liczba wzmianek', rangemode: 'tozero' },
    xaxis: { title: 'Data runu' }
  }, { responsive: true });
})();
</script>

</body>
</html>
