<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Tracker{% endblock %} — Wypasiony Draminek</title>
  <link rel="stylesheet" href="style.css">
  {% block head %}{% endblock %}
</head>
<body>
<header>
  <h1>🍹 Draminek Tracker</h1>
  <nav>
    <a href="index.html" {% if page == 'overview' %}class="active"{% endif %}>Overview</a>
    <a href="seo.html" {% if page == 'seo' %}class="active"{% endif %}>SEO</a>
    <a href="geo.html" {% if page == 'geo' %}class="active"{% endif %}>GEO</a>
    <a href="trends.html" {% if page == 'trends' %}class="active"{% endif %}>Trends</a>
  </nav>
  <span style="margin-left:auto;color:#94a3b8;font-size:0.8rem;">{{ generated_at }}</span>
</header>

<div class="container">
  {% block content %}{% endblock %}
</div>

<footer>
  Wypasiony Draminek Tracker &mdash; ostatni run: {{ latest_run }}
</footer>

{% block scripts %}{% endblock %}
</body>
</html>
