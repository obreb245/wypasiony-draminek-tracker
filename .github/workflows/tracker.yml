name: Monthly Tracker Run

on:
  schedule:
    - cron: '0 6 1 * *'  # 1st of every month, 06:00 UTC
  workflow_dispatch:
    inputs:
      engines:
        description: 'Engines to run (comma-separated or "all")'
        required: false
        default: 'all'
      mock:
        description: 'Run in mock mode (no API keys needed)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          DATAFORSEO_LOGIN: ${{ secrets.DATAFORSEO_LOGIN }}
          DATAFORSEO_PASSWORD: ${{ secrets.DATAFORSEO_PASSWORD }}
          BING_API_KEY: ${{ secrets.BING_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ENGINES="${{ github.event.inputs.engines || 'all' }}"
          MOCK="${{ github.event.inputs.mock || 'false' }}"
          if [ "$MOCK" = "true" ]; then
            python -m src.main run --engines "$ENGINES" --mock
          else
            python -m src.main run --engines "$ENGINES"
          fi

      - name: Generate dashboard
        run: |
          python -m src.main dashboard

      - name: Commit data and dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/master.csv data/runs/ docs/
          git diff --cached --quiet || git commit -m "data: monthly tracker run $(date +%Y-%m-%d)"
          git push

  deploy-pages:
    needs: run-tracker
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
